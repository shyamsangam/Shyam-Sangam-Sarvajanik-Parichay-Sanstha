<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Login & Sign Up - Shyam Sangam</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-body { background: #eef2f3; padding: 40px 20px; font-family: Arial, sans-serif; }
        .auth-wrapper { max-width: 500px; margin: 0 auto; }
        
        /* Common Card Style */
.auth-card { 
    background: white; 
    padding: 50px; /* Andar se box ko phulane ke liye */
    border-radius: 20px; 
    box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
    margin-bottom: 30px; 
    text-align: center; 
}        
        h2 { color: #003366; margin-top: 0; border-bottom: 2px solid #FFD700; display: inline-block; padding-bottom: 5px; }
        
       .auth-input { 
    width: 100%; 
    padding: 18px; /* Input box ki height badh jayegi */
    margin: 15px 0; 
    border: 1px solid #ccc; 
    border-radius: 8px; 
    font-size: 1.1em; /* Likhne wala text bada dikhega */
    box-sizing: border-box; 
}

.btn { 
    width: 100%; 
    padding: 20px; /* Button bada aur mota dikhega */
    border: none; 
    border-radius: 8px; 
    font-weight: bold; 
    cursor: pointer; 
    font-size: 1.2em; /* Button ka text bada */
    transition: 0.3s; 
    margin-top: 10px;
}

        
        .login-btn { background: #003366; color: white; }
        .signup-btn { background: #d9534f; color: white; }
        
        .btn:hover { opacity: 0.9; transform: scale(1.02); }
        
        .notice { background: #fff9e6; color: #856404; padding: 10px; border-radius: 5px; font-size: 0.9em; margin-bottom: 15px; border: 1px dashed #FFD700; }
        
        .back-home { display: block; margin-top: 15px; text-decoration: none; color: #666; font-size: 0.9em; }
    </style>
</head>
<body class="auth-body">

    <div class="auth-wrapper">
        
        <!-- 1. LOGIN SECTION -->
        <div class="auth-card">
            <h2>लॉगिन (Login)</h2>
            <p>पंजीकृत सदस्य यहाँ से प्रवेश करें</p>
            <form action="#">
                <input type="text" placeholder="मोबाइल नंबर / यूजर आईडी" class="auth-input" required>
                <input type="password" placeholder="पासवर्ड" class="auth-input" required>
                <button type="submit" class="btn login-btn">प्रवेश करें (Login)</button>
            </form>
        </div>

        <!-- 2. SIGN UP SECTION -->
        <div class="auth-card">
            <h2>साइन अप (Sign Up / नया खाता)</h2>
            <div class="notice">
                नया खाता बनाने के बाद प्रोफाइल एक्टिवेशन के लिए ₹501 सहयोग राशि अनिवार्य है।
            </div>
            <form action="#">
                <input type="text" placeholder="आपका पूरा नाम" class="auth-input" required>
                <input type="tel" placeholder="मोबाइल नंबर" class="auth-input" required>
                <input type="password" placeholder="एक मजबूत पासवर्ड बनाएं" class="auth-input" required>
                <button type="submit" class="btn signup-btn">खाता बनाएं (Register)</button>
            </form>
        </div>

        <a href="index.html" class="back-home">← वापस होम पेज पर जाएँ</a>
    </div>

</body>
</html>
